<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METAFORGE | Interactive Engine Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #9B5DE5;
            --brand-secondary: #120A1A;
            --brand-dark: #0F0F0F;
            --brand-gray: #4A4A4A;
            --brand-light: #F5F5F5;
            
            /* Template Variables */
            --tpl-primary: var(--brand-primary);
            --tpl-secondary: var(--brand-secondary);
        }

        [data-theme="light"] {
            --brand-dark: #F5F5F5;
            --brand-secondary: #FFFFFF;
            --brand-light: #120A1A;
        }

        body { 
            background: var(--brand-dark); 
            color: white; 
            font-family: 'Rajdhani', sans-serif; 
            margin: 0; 
            padding: 0; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.5s ease;
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(155, 93, 229, 0.2);
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            letter-spacing: 2px;
            color: var(--brand-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .demo-container {
            flex: 1;
            display: grid;
            grid-template-columns: 350px 1fr;
            overflow: hidden;
        }

        .controls {
            padding: 30px;
            background: rgba(255, 255, 255, 0.02);
            border-right: 1px solid rgba(155, 93, 229, 0.1);
            overflow-y: auto;
        }

        .preview-pane {
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            background: white;
            border-radius: 4px;
        }

        .control-group { margin-bottom: 25px; }
        label { 
            display: block; 
            font-family: 'Orbitron', sans-serif; 
            font-size: 10px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 10px;
            color: var(--brand-primary);
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(155, 93, 229, 0.2);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            border-radius: 4px;
            outline: none;
        }

        .template-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .tpl-card {
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            font-size: 12px;
            transition: all 0.3s;
        }

        .tpl-card.active {
            border-color: var(--brand-primary);
            background: rgba(155, 93, 229, 0.1);
        }

        .action-btn {
            width: 100%;
            padding: 15px;
            background: var(--brand-primary);
            border: none;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .action-btn:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        @media (max-width: 900px) {
            .demo-container { grid-template-columns: 1fr; }
            .controls { display: none; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            METAFORGE
        </a>
        <div style="display: flex; gap: 20px; align-items: center;">
            <span style="font-size: 12px; opacity: 0.6; letter-spacing: 1px;">INTERACTIVE PREVIEW MODE</span>
            <button id="themeToggle" style="background:none; border:none; cursor:pointer; font-size: 20px;">🌙</button>
        </div>
    </header>

    <div class="demo-container">
        <div class="controls">
            <div class="control-group">
                <label>Document Identity</label>
                <input type="text" id="brandName" placeholder="Company Name" value="CYBERDYNE SYSTEMS">
            </div>
            
            <div class="control-group">
                <label>Interface Language</label>
                <select id="lang">
                    <option value="en">English (Global)</option>
                    <option value="fr">French (Europe)</option>
                    <option value="es">Spanish (Global)</option>
                    <option value="de">German (Europe)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Visual Engine</label>
                <div class="template-grid">
                    <div class="tpl-card active" data-tpl="modern-tech">Modern Tech</div>
                    <div class="tpl-card" data-tpl="minimalist-pro">Minimalist Pro</div>
                    <div class="tpl-card" data-tpl="cyber-punk">Cyber Punk</div>
                    <div class="tpl-card" data-tpl="corporate-luxe">Corporate Luxe</div>
                </div>
            </div>

            <div class="control-group">
                <label>Core Colors</label>
                <div style="display: flex; gap: 10px;">
                    <input type="color" id="primaryColor" value="#9B5DE5" style="height: 40px; padding: 2px;">
                    <input type="color" id="secondaryColor" value="#120A1A" style="height: 40px; padding: 2px;">
                </div>
            </div>

            <button class="action-btn" onclick="updatePreview()">REFRESH ENGINE</button>
            <p style="font-size: 10px; opacity: 0.5; margin-top: 20px; line-height: 1.6;">
                This demo uses a sandboxed version of the MetaForge Engine. Full features like Firestore logging and QR verification are enabled in the production instance.
            </p>
        </div>
        
        <div class="preview-pane">
            <iframe id="previewFrame" src="engine/index.html#demo=true"></iframe>
        </div>
    </div>

    <script>
        const frame = document.getElementById('previewFrame');
        const themeBtn = document.getElementById('themeToggle');
        
        // Theme Sync
        const getStoredTheme = () => localStorage.getItem('metaforge_theme') || 'dark';
        function applyTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            themeBtn.textContent = theme === 'light' ? '☀️' : '🌙';
            localStorage.setItem('metaforge_theme', theme);
        }

        themeBtn.onclick = () => {
            const newTheme = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            applyTheme(newTheme);
        };

        applyTheme(getStoredTheme());
        window.addEventListener('storage', (e) => {
            if (e.key === 'metaforge_theme') applyTheme(e.newValue);
        });

        // Demo Logic
        function encodeData(obj) {
            try {
                const jsonStr = JSON.stringify(obj);
                const utf8Bytes = new TextEncoder().encode(jsonStr);
                let binary = "";
                for (let i = 0; i < utf8Bytes.byteLength; i++) { 
                    binary += String.fromCharCode(utf8Bytes[i]); 
                }
                return btoa(binary);
            } catch (e) {
                console.error("Encoding error:", e);
                return btoa(JSON.stringify({error: "Encoding failed"}));
            }
        }

        function updatePreview() {
            const config = {
                bn: document.getElementById('brandName').value,
                pc: document.getElementById('primaryColor').value,
                sc: document.getElementById('secondaryColor').value,
                tp: document.querySelector('.tpl-card.active').dataset.tpl,
                lang: document.getElementById('lang').value,
                dm: true
            };
            
            const hash = encodeData(config);
            frame.src = `engine/index.html#${hash}`;
        }

        document.querySelectorAll('.tpl-card').forEach(card => {
            card.onclick = () => {
                document.querySelectorAll('.tpl-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                updatePreview();
            };
        });

        // Initial update
        setTimeout(updatePreview, 1000);
    </script>
</body>
</html>
