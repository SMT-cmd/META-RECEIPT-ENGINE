<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f4f7f9; margin: 0; color: #333; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: #666; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h1>Redirecting to your Engine</h1>
    <p>Please wait a moment...</p>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAElgJBP-F322zoJ-T1qeE48s2ka0EcEvw", 
            authDomain: "metaforge-6afdf.firebaseapp.com", 
            projectId: "metaforge-6afdf", 
            storageBucket: "metaforge-6afdf.firebasestorage.app", 
            messagingSenderId: "261172077627", 
            appId: "1:261172077627:web:cb3cec74be2dbcb1d6281e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function handleRedirect() {
            // Get code from URL (e.g., /r/CODE or /r/?c=CODE)
            const pathParts = window.location.pathname.split('/');
            let code = pathParts.pop();
            
            // Handle trailing slash
            if (!code && pathParts.length > 0) code = pathParts.pop();
            
            // Fallback to query param
            if (!code || code === 'index.html') {
                const urlParams = new URLSearchParams(window.location.search);
                code = urlParams.get('c');
            }

            if (!code || code.length < 5) {
                showError("Invalid or missing engine code.");
                return;
            }

            try {
                // 1. Try Firestore first (Dynamic)
                const docRef = doc(db, "short_urls", code.toUpperCase());
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.status === 'shutdown') {
                        showError("This engine has been deactivated.");
                        return;
                    }
                    
                    // Increment usage
                    updateDoc(docRef, { usage: increment(1) });
                    
                    const destination = data.original_url || `${window.location.origin}/engine/index.html#_sc=${code}`;
                    window.location.replace(destination);
                    return;
                }

                // 2. Try static redirects.json (GitHub Pages Fallback)
                try {
                    const response = await fetch('../redirects.json');
                    if (response.ok) {
                        const redirects = await response.json();
                        if (redirects[code.toUpperCase()]) {
                            window.location.replace(redirects[code.toUpperCase()]);
                            return;
                        }
                    }
                } catch (e) { console.warn("Static redirects not found."); }

                showError("Engine not found. It may have expired or been deleted.");

            } catch (error) {
                console.error("Redirect error:", error);
                showError("A connection error occurred. Please try again.");
            }
        }

        function showError(msg) {
            document.body.innerHTML = `
                <div style="text-align: center; padding: 20px;">
                    <h1 style="color: #e74c3c;">Oops!</h1>
                    <p>${msg}</p>
                    <a href="../index.html" style="color: #3498db; text-decoration: none; font-weight: bold;">Return to MetaForge</a>
                </div>
            `;
        }

        handleRedirect();
    </script>
</body>
</html>
